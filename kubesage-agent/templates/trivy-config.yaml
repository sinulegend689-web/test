apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "mychart.fullname" . }}-trivy-config
  labels:
    app: trivy-operator
    {{- include "mychart.labels" . | nindent 4 }}
data:
  # This matches your requirement: trivy.ignoreUnfixed: true
  trivy.ignoreUnfixed: "true"
  trivy.severity: "UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL"

  # --- CRITICAL FIX START ---
  # Force the operator to use the correct ServiceAccount for Vulnerability Scans
  scanJob.serviceAccount: "{{ include "mychart.fullname" . }}-trivy-operator"
  
  # Also fix it for Node Scans (to prevent future errors)
  nodeCollector.serviceAccount: "{{ include "mychart.fullname" . }}-trivy-operator"
  # --- CRITICAL FIX END ---
