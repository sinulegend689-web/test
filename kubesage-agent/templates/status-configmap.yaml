apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "mychart.fullname" . }}-status-script
  labels:
    {{- include "mychart.labels" . | nindent 4 }}
  annotations:
    # Keep these hooks so it aligns with the Job
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation
data:
  update-status.sh: |
    #!/bin/sh
    # Remove 'set -e' so we can handle errors manually in the loop
   
    # 1. Setup Variables
    # --- FIX IS HERE: WE APPEND :8002 MANUALLY ---
    RAW_HOST="{{ .Values.endpoint }}:8002"

    # Protocol Detection
    if echo "$RAW_HOST" | grep -q "^http"; then
      BASE_URL="$RAW_HOST"
    else
      # Default to https (curl -k allows this even on IPs)
      BASE_URL="https://$RAW_HOST"
    fi

    API_URL="${BASE_URL}/api/onboard/v1/tools/installation/started"
    CLUSTER_NAME="{{ .Values.clusterName }}"

    echo "INFO: Target API URL: $API_URL"

    # 2. Define the Retry Function
    send_status_with_retry(){
      local status_msg="$1"
      local payload="{\"cluster_name\":\"${CLUSTER_NAME}\",\"status\":\"${status_msg}\"}"
      local max_retries=5
      local attempt=1
      local delay=3

      while [ $attempt -le $max_retries ]; do
        echo "INFO: Sending '$status_msg' (Attempt $attempt/$max_retries)..."
       
        # Capture HTTP code
        http_code=$(curl -k -m 10 -s -o /dev/null -w "%{http_code}" \
          -H "Content-Type: application/json" \
          -d "${payload}" \
          "${API_URL}")

        if [ "$http_code" = "200" ] || [ "$http_code" = "201" ] || [ "$http_code" = "202" ]; then
           echo "SUCCESS: Status sent."
           return 0
        fi

        echo "WARN: Failed with HTTP $http_code. Retrying in ${delay}s..."
        sleep $delay
        attempt=$((attempt + 1))
      done

      echo "ERROR: Failed to send status after $max_retries attempts. Continuing anyway to try next status..."
      return 1
    }

    # 3. Execute Updates with Retry
    send_status_with_retry "Tools Installation Started..."
   
    sleep 2
    send_status_with_retry "Tools Installation In Progress..."
   
    sleep 2
    send_status_with_retry "Monitoring Tools Installation In Progress..."
   
    sleep 2
    send_status_with_retry "Security Tools Installation In Progress..."
   
    sleep 2
    send_status_with_retry "Cluster Onboarded Successfully"

    echo "ALL DONE: Script finished."
