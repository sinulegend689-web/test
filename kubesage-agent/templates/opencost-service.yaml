apiVersion: v1
kind: Service
metadata:
  name: {{ include "mychart.fullname" . }}-opencost
  labels:
    app: opencost
    {{- include "mychart.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 9003
      targetPort: 9003
      name: http
      protocol: TCP
  selector:
    app: opencost
    {{- include "mychart.selectorLabels" . | nindent 4 }}
