apiVersion: v1
kind: Service
metadata:
  name: {{ include "mychart.fullname" . }}-alloy-scraper
  labels:
    app: alloy-scraper
    {{- include "mychart.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 12345
      targetPort: 12345
      name: ui
      protocol: TCP
  selector:
    app: alloy-scraper
    {{- include "mychart.selectorLabels" . | nindent 4 }}
