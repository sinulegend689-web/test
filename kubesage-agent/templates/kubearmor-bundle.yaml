# Added manually to fix "forbidden" errors for KubeArmor Controller
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-kubearmor-controller-manual-role
rules:
# 1. Allow watching Nodes
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get", "list", "watch"]
# 2. Allow watching Security Policies
- apiGroups: ["security.kubearmor.com"]
  resources: ["kubearmorpolicies", "kubearmorhostpolicies"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-kubearmor-controller-manual-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Release.Name }}-kubearmor-controller-manual-role
subjects:
- kind: ServiceAccount
  # The logs show the user is "kubearmor-controller"
  name: kubearmor-controller
  namespace: {{ .Release.Namespace }}
---
# Added manually to fix "cannot list policies/namespaces" error for KubeArmor
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-kubearmor-policy-manager-role
rules:
# 1. Allow reading KubeArmor Security Policies
- apiGroups: ["security.kubearmor.com"]
  resources: ["kubearmorpolicies", "kubearmorclusterpolicies"]
  verbs: ["get", "list", "watch"]
# 2. Allow reading Core Metadata (Namespaces/ConfigMaps)
- apiGroups: [""]
  resources: ["namespaces", "configmaps"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-kubearmor-policy-manager-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Release.Name }}-kubearmor-policy-manager-role
subjects:
- kind: ServiceAccount
  name: kubearmor
  namespace: {{ .Release.Namespace }}
---
# Added manually to fix "cannot list resource nodes" error for KubeArmor Agent
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-kubearmor-agent-node-role
rules:
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-kubearmor-agent-node-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Release.Name }}-kubearmor-agent-node-role
subjects:
- kind: ServiceAccount
  # Based on your logs, the ServiceAccount is named exactly "kubearmor"
  name: kubearmor
  namespace: {{ .Release.Namespace }}
---
