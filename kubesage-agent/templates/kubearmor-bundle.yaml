# Source: kubearmor-operator/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-kubearmor-operator
  namespace: {{ .Release.Namespace }}
  labels:
    kubearmor-app: kubearmor-operator
spec:
  selector:
    matchLabels:
      kubearmor-app: kubearmor-operator
  template:
    metadata:
      labels:
        kubearmor-app: kubearmor-operator
    spec:
      containers:
      - name: {{ .Release.Name }}-kubearmor-operator
        env:
        - name: KUBEARMOR_OPERATOR_NS
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        image: docker.io/kubearmor/kubearmor-operator:v1.6.6
        imagePullPolicy: IfNotPresent
        args:
        - --annotateExisting=false
        - --annotateResource=false
      serviceAccountName: {{ .Release.Name }}-kubearmor-operator
---
