apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "mychart.fullname" . }}-trivy-operator
  labels:
    app: trivy-operator
    {{- include "mychart.labels" . | nindent 4 }}
---
# 1. Global Permissions
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "mychart.fullname" . }}-trivy-operator
rules:
  - apiGroups: [""]
    resources: 
      - "pods"
      - "pods/spec"
      - "pods/log"  # <--- THIS WAS MISSING. REQUIRED TO READ SCAN RESULTS.
      - "replicationcontrollers"
      - "services"
      - "configmaps"
      - "nodes"
      - "namespaces"
      - "secrets"
      - "events"
      - "serviceaccounts"
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["replicasets", "deployments", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch"]
  
  # Operator needs to CREATE jobs to run scans
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch", "create", "delete", "deletecollection"]

  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings", "clusterroles", "clusterrolebindings"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies", "ingresses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  
  # UPDATED SECTION: Added sbomreports, clustersbomreports, clustervulnerabilityreports
  - apiGroups: ["aquasecurity.github.io"]
    resources: [
      "vulnerabilityreports", 
      "clustervulnerabilityreports", 
      "sbomreports", 
      "clustersbomreports", 
      "configauditreports", 
      "clusterconfigauditreports", 
      "infraassessmentreports", 
      "clusterinfraassessmentreports", 
      "rbacassessmentreports", 
      "clusterrbacassessmentreports", 
      "exposedsecretreports",
      "clustercompliancereports"
    ]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "mychart.fullname" . }}-trivy-operator
subjects:
  - kind: ServiceAccount
    name: {{ include "mychart.fullname" . }}-trivy-operator
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ include "mychart.fullname" . }}-trivy-operator
  apiGroup: rbac.authorization.k8s.io
---
# 2. Local Permissions (For Leader Election Lock)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "mychart.fullname" . }}-trivy-operator-leader-election
  namespace: {{ .Release.Namespace }}
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets", "events"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "mychart.fullname" . }}-trivy-operator-leader-election
  namespace: {{ .Release.Namespace }}
subjects:
  - kind: ServiceAccount
    name: {{ include "mychart.fullname" . }}-trivy-operator
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ include "mychart.fullname" . }}-trivy-operator-leader-election
  apiGroup: rbac.authorization.k8s.io
