apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "mychart.fullname" . }}-agent
  labels:
    {{- include "mychart.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "mychart.fullname" . }}-agent
rules:
  # Required for scraping K8s metrics
  - apiGroups: [""]
    resources: ["nodes", "nodes/proxy", "services", "endpoints", "pods", "namespaces", "configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "daemonsets", "replicasets", "statefulsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["non-resource-urls"]
    resources: ["/metrics"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "mychart.fullname" . }}-agent
subjects:
  - kind: ServiceAccount
    name: {{ include "mychart.fullname" . }}-agent
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ include "mychart.fullname" . }}-agent
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "mychart.fullname" . }}-agent-config
  labels:
    {{- include "mychart.labels" . | nindent 4 }}
data:
  agent.yaml: |
    # 1. METRICS CONFIG (Prometheus)
    metrics:
      global:
        scrape_interval: 60s
        external_labels:
          cluster: "{{ .Values.clusterName }}"
          username: "{{ .Values.username }}"
      wal_directory: /tmp/grafana-agent-wal
      
      configs:
        - name: default
          remote_write:
            - url: {{ .Values.prometheusUrl }}/api/v1/write
              basic_auth:
                username: "{{ .Values.username }}"
                password: "{{ .Values.apiKey }}"

          scrape_configs:
            # --- 1. Kube State Metrics ---
            - job_name: kube-state-metrics
              honor_labels: true
              static_configs:
                - targets: ['{{ include "mychart.fullname" . }}-ksm.{{ .Release.Namespace }}.svc.cluster.local:8080']
                  labels:
                    job: kube-state-metrics
                    namespace: {{ .Release.Namespace }}

            # --- 2. Kubelet / cAdvisor ---
            - job_name: kubernetes-nodes
              scheme: https
              tls_config:
                ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
                insecure_skip_verify: true
              bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
              kubernetes_sd_configs:
                - role: node
              relabel_configs:
                - action: labelmap
                  regex: __meta_kubernetes_node_label_(.+)
            
            # --- 3. Pod Scaping (Includes Node Exporter) ---
            - job_name: kubernetes-pods
              kubernetes_sd_configs:
                - role: pod
              relabel_configs:
                # A. Scrape Annotation Check
                - action: keep
                  regex: true
                  source_labels:
                    - __meta_kubernetes_pod_annotation_prometheus_io_scrape
                
                # B. Fix Metrics Path
                - action: replace
                  regex: (.+)
                  source_labels:
                    - __meta_kubernetes_pod_annotation_prometheus_io_path
                  target_label: __metrics_path__
                
                # C. Fix Address/Port
                - action: replace
                  regex: ([^:]+)(?::\d+)?;(\d+)
                  replacement: $1:$2
                  source_labels:
                    - __address__
                    - __meta_kubernetes_pod_annotation_prometheus_io_port
                  target_label: __address__
                
                # D. Map Labels
                - action: labelmap
                  regex: __meta_kubernetes_pod_label_(.+)
                
                # E. Add 'node' label
                - action: replace
                  source_labels: [__meta_kubernetes_pod_node_name]
                  target_label: node

                # F. Network Dashboard Fix: Override instance for node-exporter
                - action: replace
                  source_labels: [__meta_kubernetes_pod_label_app, __meta_kubernetes_pod_node_name]
                  separator: ";"
                  regex: ^node-exporter;(.+)$
                  target_label: instance
                  replacement: $1

    # 2. LOGS CONFIG (Loki)
    logs:
      configs:
        - name: default
          positions:
            filename: /tmp/positions.yaml
          clients:
            - url: {{ .Values.loki }}/loki/api/v1/push
              external_labels:
                cluster: "{{ .Values.clusterName }}"
                username: "{{ .Values.username }}"
          scrape_configs:
            - job_name: kubernetes-pods
              kubernetes_sd_configs:
                - role: pod
              pipeline_stages:
                - docker: {}
              relabel_configs:
                - source_labels: [__meta_kubernetes_pod_node_name]
                  target_label: __host__
                - action: labelmap
                  regex: __meta_kubernetes_pod_label_(.+)
                - action: replace
                  source_labels: [__meta_kubernetes_namespace]
                  target_label: namespace
                - action: replace
                  source_labels: [__meta_kubernetes_pod_name]
                  target_label: pod
                - action: replace
                  source_labels: [__meta_kubernetes_pod_container_name]
                  target_label: container
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "mychart.fullname" . }}-agent
  labels:
    app: k8s-monitoring
    {{- include "mychart.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app: k8s-monitoring
      {{- include "mychart.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app: k8s-monitoring
        {{- include "mychart.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "mychart.fullname" . }}-agent
      containers:
        - name: agent
          image: grafana/agent:v0.40.4
          imagePullPolicy: IfNotPresent
          args:
            - "-config.file=/etc/agent/agent.yaml"
            - "-enable-features=integrations-next"
            - "-server.http.address=0.0.0.0:8080"
          ports:
            - containerPort: 8080
              name: http-metrics
          env:
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - name: config
              mountPath: /etc/agent
            - name: varlog
              mountPath: /var/log
            - name: varlibdockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true
          securityContext:
            privileged: true
            runAsUser: 0
      volumes:
        - name: config
          configMap:
            name: {{ include "mychart.fullname" . }}-agent-config
        - name: varlog
          hostPath:
            path: /var/log
        - name: varlibdockercontainers
          hostPath:
            path: /var/lib/docker/containers
