{{- /* ======================================== */}}
{{- /* 4. ServiceAccount – KubeSage Agent */}}
{{- /* ======================================== */}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubesage-agent
  namespace: {{ .Release.Namespace }}
---
{{- /* ======================================== */}}
{{- /* 5. ConfigMap – Agent Env */}}
{{- /* ======================================== */}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: agent-env
  namespace: {{ .Release.Namespace }}
data:
  AGENT_ID: "{{ .Values.agentId }}"
  API_KEY: "{{ .Values.apiKey }}"
  CLUSTER_NAME: "{{ .Values.clusterName }}"
  PROVIDER_NAME: "{{ .Values.providerName }}"
  TAGS_JSON: '{{ toJson .Values.tags }}'
  BACKEND_URL: "https://{{ .Values.endpoint }}:8002/api/onboard/v1/onboard"
  BACKEND_WS_URL: "wss://{{ .Values.endpoint }}:8002/api/onboard/v1/ws"
  PORT: "9000"
  SKIP_TLS_VERIFY: "true"
  DEBUG: "true"
  LOG_LEVEL: "INFO"
  PROMETHEUS_URL: "{{ .Values.prometheusUrl }}"
---
{{- /* ======================================== */}}
{{- /* 6. ClusterRole – KubeSage Agent */}}
{{- /* ======================================== */}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubesage-agent-role-{{ .Release.Namespace }}
rules:
  # Core API group
  - apiGroups: [""]
    resources:
      - nodes
      - namespaces
      - pods
      - pods/log
      - pods/exec
      - pods/status
      - services
      - persistentvolumes
      - persistentvolumeclaims
      - configmaps
      - secrets
      - serviceaccounts
      - events
    verbs: ["*"]
  
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["*"]  
  # Apps
  - apiGroups: ["apps"]
    resources:
      - deployments
      - replicasets
      - statefulsets
      - daemonsets
    verbs: ["*"]
  
  # Batch
  - apiGroups: ["batch"]
    resources:
      - jobs
      - cronjobs
    verbs: ["*"]
  
  # Metrics
  - apiGroups: ["metrics.k8s.io"]
    resources:
      - pods
      - nodes
    verbs: ["*"]
  
  - apiGroups: [""]
    resources: ["namespaces/finalize"]
    verbs: ["update", "get"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "delete"]  
  # RBAC
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources:
      - roles
      - rolebindings
      - clusterroles
      - clusterrolebindings
    verbs: ["*"]
  
  # Networking
  - apiGroups: ["networking.k8s.io", "extensions"]
    resources:
      - ingresses
      - networkpolicies
    verbs: ["*"]
  
  # Kyverno
  - apiGroups: ["kyverno.io"]
    resources: ["*"]
    verbs: ["*"]
  
  # KubeArmor
  - apiGroups: ["security.kubearmor.com"]
    resources: ["*"]
    verbs: ["*"]
  
  # Autoscaling
  - apiGroups: ["autoscaling"]
    resources:
      - horizontalpodautoscalers
    verbs: ["*"]
  
  # Node Feature Discovery
  - apiGroups: ["nfd.k8s-sigs.io"]
    resources: ["*"]
    verbs: ["*"]

---
{{- /* ======================================== */}}
{{- /* 7. ClusterRoleBinding – KubeSage Agent */}}
{{- /* ======================================== */}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubesage-agent-binding-{{ .Release.Namespace }}
subjects:
- kind: ServiceAccount
  name: kubesage-agent
  namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: kubesage-agent-role-{{ .Release.Namespace }}
  apiGroup: rbac.authorization.k8s.io
---
{{- /* ======================================== */}}
{{- /* 8. Deployment – kubesage-agent */}}
{{- /* ======================================== */}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubesage-agent
  namespace: {{ .Release.Namespace }}
  labels:
    app: kubesage-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kubesage-agent
  template:
    metadata:
      labels:
        app: kubesage-agent
    spec:
      serviceAccountName: kubesage-agent
      tolerations:
        - key: "node.kubernetes.io/disk-pressure"
          operator: "Exists"
          effect: "NoSchedule"
      containers:
      - name: agent
        image: os3infotech/agent-stack:v1.0.0
        imagePullPolicy: Always
        ports:
        - containerPort: 9000
        envFrom:
        - configMapRef:
            name: agent-env
---
{{- /* ======================================== */}}
{{- /* 9. Service – NodePort */}}
{{- /* ======================================== */}}
apiVersion: v1
kind: Service
metadata:
  name: kubesage-agent-svc
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: kubesage-agent
  ports:
  - protocol: TCP
    port: 9000
    targetPort: 9000
    nodePort: {{ .Values.nodePort | default 31245 }}
  type: NodePort
