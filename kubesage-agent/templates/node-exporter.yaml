# ---------------------------------------------------------
# 1. NEW: Service Definition
# Required so Alloy can find this pod via DNS (e.g., node-exporter.namespace.svc)
# ---------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: {{ include "mychart.fullname" . }}-node-exporter
  labels:
    app: node-exporter
    {{- include "mychart.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: node-exporter
    {{- include "mychart.selectorLabels" . | nindent 4 }}
  ports:
    - name: metrics
      port: 9100
      targetPort: 9100
      protocol: TCP
---
# ---------------------------------------------------------
# 2. UPDATED: DaemonSet
# hostNetwork is now FALSE to prevent conflicts
# ---------------------------------------------------------
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "mychart.fullname" . }}-node-exporter
  labels:
    app: node-exporter
    {{- include "mychart.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app: node-exporter
      {{- include "mychart.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app: node-exporter
        {{- include "mychart.selectorLabels" . | nindent 8 }}
      # Annotations kept for compatibility
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9100"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: {{ include "mychart.fullname" . }}-agent
      
      # --- CRITICAL FIX ---
      # CHANGED FROM true TO false
      # This allows you to install multiple instances without port conflicts
      hostNetwork: false
      # --------------------
      
      hostPID: true # Keep true so we can still see process metrics
      containers:
        - name: node-exporter
          image: quay.io/prometheus/node-exporter:v1.7.0
          args:
            - "--path.procfs=/host/proc"
            - "--path.sysfs=/host/sys"
            - "--path.rootfs=/host/root"
            - "--no-collector.wifi"
            - "--no-collector.hwmon"
            - "--collector.filesystem.mount-points-exclude=^/(dev|proc|sys|var/lib/docker/.+|var/lib/kubelet/.+)($|/)"
            - "--web.listen-address=:9100"
          ports:
            - containerPort: 9100
              name: metrics
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          volumeMounts:
            - mountPath: /host/proc
              name: proc
              readOnly: true
            - mountPath: /host/sys
              name: sys
              readOnly: true
            - mountPath: /host/root
              name: root
              readOnly: true
      volumes:
        - name: proc
          hostPath:
            path: /proc
        - name: sys
          hostPath:
            path: /sys
        - name: root
          hostPath:
            path: /
