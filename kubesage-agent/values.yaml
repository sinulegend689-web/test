clusterName: ""
username: ""
prometheusUrl: ""
lokiUrl: ""
endpoint: ""
providerName: ""
tags: []
agentId: ""
apiKey: ""
namespaceOverride: ""
kubearmor:
  enabled: true
  config:
    enableSecurity: true
    enableVisibility: true
    enablePolicy: true
# Add this to your values.yaml
image:
  repository: ghcr.io/resmoio/kubernetes-event-exporter
  tag: "latest"
  pullPolicy: IfNotPresent

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""
# Configuration for the k8s-monitoring subchart
k8s-monitoring:
  cluster:
    name: "" # Will be overridden by --set
  opencost:
    enabled: false
  grafana:
    enabled: true
  externalServices:
    prometheus:
      host: "" # Will be overridden by --set
      writeEndpoint: "/api/v1/write"
      externalLabels:
        username: "" # Will be overridden by --set
    loki:
      host: "" # Will be overridden by --set
# Configuration for the separate Alloy instance
# Configuration for Trivy Operator
trivy-operator:
  operator:
    # Enables exposing vulnerability IDs in metrics (Important for your dashboards)
    metricsVulnIdEnabled: true
  
  trivy:
    # Only report fixed vulnerabilities (reduces noise)
    ignoreUnfixed: true
    
  service:
    # Ensures a ClusterIP is created so Alloy can scrape it via specific IP/DNS
    headless: false
    
  # If you are using the Alloy scraper we built earlier, you can disable ServiceMonitor
  # unless you have the Prometheus Operator installed.
  serviceMonitor:
    enabled: false

kepler:
  # 1. Disable Host Network
  hostNetwork: false

  # 2. Service Config
  service:
    enabled: true
    type: ClusterIP
    port: 9102

  # 3. RBAC
  rbac:
    create: true

  # 4. FIX: Move 'privileged' to the Container level
  # (Most Kepler charts use 'containerSecurityContext' or just 'securityContext' for this)
  containerSecurityContext:
    privileged: true
    allowPrivilegeEscalation: true
